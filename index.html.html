<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Interactive Module - Enhanced Formatting</title>
    <style>
        /* 基础重置与深色主题背景 */
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #131314;
            color: #e3e3e3;
            margin: 0;
            display: flex;
            justify-content: center;
            height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 800px;
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
        }

        .chat-history {
            flex: 1;
            overflow-y: auto;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        .chat-history::-webkit-scrollbar {
            width: 8px;
        }
        .chat-history::-webkit-scrollbar-thumb {
            background: #444746;
            border-radius: 4px;
        }

        .message {
            display: flex;
            gap: 16px;
            max-width: 85%;
        }
        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }
        .message.ai {
            align-self: flex-start;
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
            font-size: 14px;
        }
        .user .avatar { background-color: #a8c7fa; color: #041e49; }
        .ai .avatar { background-color: #ffffff; color: #000000; }

        .content {
            padding: 12px 16px;
            border-radius: 16px;
            line-height: 1.6;
            font-size: 16px;
            word-wrap: break-word;
        }
        
        .user .content {
            background-color: #282a2c;
            border-top-right-radius: 4px;
        }
        
        .ai .content {
            background-color: transparent;
            padding-left: 0;
            padding-top: 6px;
            color: #e3e3e3; /* 基础文字颜色为灰白 */
        }

        /* === 核心修改：强化 AI 回复中的加粗和标题样式 === */
        .ai .content strong {
            color: #ffffff; /* 加粗文字变成纯白色，对比更明显 */
            font-weight: 600;
        }
        .ai .content .heading {
            color: #a8c7fa; /* 标题采用浅蓝色 */
            font-weight: 700;
            font-size: 18px;
            display: block;
            margin-top: 8px;
            margin-bottom: 4px;
        }
        /* =============================================== */

        .input-container {
            padding: 20px;
            background: #131314;
            padding-bottom: 40px;
        }

        .input-box {
            display: flex;
            background: #1e1f20;
            border-radius: 24px;
            padding: 12px 16px;
            align-items: center;
            border: 1px solid transparent;
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: #e3e3e3;
            font-size: 16px;
            resize: none;
            outline: none;
            padding: 4px 0;
            font-family: inherit;
            line-height: 1.5;
            cursor: default;
        }

        .input-box button {
            background: transparent;
            border: none;
            color: #c4c7c5;
            cursor: pointer;
            padding: 8px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            margin-left: 8px;
        }
        
        .input-box button:not(:disabled):hover {
            background: #333537;
            color: #e3e3e3;
        }
        
        .input-box button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .input-box button svg {
            width: 24px;
            height: 24px;
            fill: currentColor;
        }
        
        .typing-indicator {
            display: inline-block;
            font-size: 16px;
            animation: blink 1s infinite;
        }
        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-history" id="chatHistory">
        <div class="message ai">
            <div class="avatar">AI</div>
            <div class="content">What’s on your mind today?</div>
        </div>
    </div>

    <div class="input-container">
        <div class="input-box">
            <textarea id="userInput" rows="2" readonly>I like anime comedy movies, or Marvel superhero movies. Can you recommend one for me?</textarea>
            <button id="sendBtn" onclick="sendMessage()">
                <svg viewBox="0 0 24 24">
                    <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                </svg>
            </button>
        </div>
    </div>
</div>

<script>
    const chatHistory = document.getElementById('chatHistory');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');

    // === 核心修改：重新排版了回复内容，加入了蓝色标题类名、显著加粗以及圆点列表 ===
    const fixedAIResponse = `To give you the perfect movie for tonight, I selected <strong>'Spider-Man: Into the Spider-Verse'</strong>. Here is a breakdown of why this film was chosen and the recommendation logic behind it:
<br><br>
<span class="heading">How I Picked This Movie for You (Recommendation Logic)</span>
To find the perfect movie for you tonight, my "brain" (the system) basically went through three simple steps:
<br><br>
• <strong>Identifying Your Core Needs (Highlighting Key Points):</strong> First, I extracted the three most important tags from what you said: [Animation], [Comedy], and [Marvel Superhero].
<br><br>
• <strong>Finding the Perfect Overlap (Process of Elimination):</strong> Next, I searched through a massive movie database specifically for films that could simultaneously satisfy all three of these conditions. For example, standard live-action Marvel movies (like The Avengers) were eliminated because they aren't "animated"; meanwhile, regular funny anime was filtered out because it doesn't feature "Marvel heroes."
<br><br>
• <strong>Locking in the Top Score (Picking the Best of the Best):</strong> After this filtering process, Spider-Man: Into the Spider-Verse earned a perfect 100% match score. Because it flawlessly combines all three elements you wanted and has incredibly high ratings and reviews from audiences worldwide, it naturally became my top recommendation for your night!
<br><br>
<span class="heading">Why This Film Fits Your Criteria</span>
<br>
• <strong>Why it is a Marvel Superhero Movie:</strong> It is a pure, licensed Marvel property centered around the iconic Spider-Man lore. It features classic comic book elements: radioactive spider bites, web-slinging action, a multiverse crisis, and a battle against a major Marvel supervillain (Kingpin).
<br><br>
• <strong>Why it is an Animated Comedy:</strong> Rather than a serious, dark drama, this film relies heavily on situational humor, self-aware meta-jokes, and slapstick comedy. The humor shines through its animated medium—featuring hilarious characters like Spider-Ham (a Looney Tunes-style cartoon pig) and an out-of-shape, cynical older Peter Parker who acts as a terrible mentor.`;

    function sendMessage() {
        const text = userInput.value;
        if (!text) return;
        
        appendMessage('user', text);
        
        userInput.value = '';
        sendBtn.disabled = true;

        simulateAIResponse();
    }

    function appendMessage(sender, text) {
        const messageDiv = document.createElement('div');
        messageDiv.className = `message ${sender}`;
        
        const avatarDiv = document.createElement('div');
        avatarDiv.className = 'avatar';
        avatarDiv.textContent = sender === 'user' ? 'Me' : 'AI';

        const contentDiv = document.createElement('div');
        contentDiv.className = 'content';
        contentDiv.innerHTML = text;

        messageDiv.appendChild(avatarDiv);
        messageDiv.appendChild(contentDiv);
        chatHistory.appendChild(messageDiv);

        chatHistory.scrollTop = chatHistory.scrollHeight;
        
        return contentDiv;
    }

    function simulateAIResponse() {
        const contentDiv = appendMessage('ai', '<span class="typing-indicator">● ● ●</span>');
        
        setTimeout(() => {
            typeWriterEffectHTML(contentDiv, fixedAIResponse, 0);
        }, 800);
    }

    function typeWriterEffectHTML(element, htmlString, index) {
        if (index === 0) {
            element.innerHTML = ''; 
        }
        
        if (index < htmlString.length) {
            // 完整读取 HTML 标签，防止标签被拆散输出导致样式失效
            if (htmlString.charAt(index) === '<') {
                let tag = '';
                while (htmlString.charAt(index) !== '>' && index < htmlString.length) {
                    tag += htmlString.charAt(index);
                    index++;
                }
                tag += '>';
                element.innerHTML += tag;
                index++; 
            } else {
                element.innerHTML += htmlString.charAt(index);
                index++;
            }

            chatHistory.scrollTop = chatHistory.scrollHeight;
            
            const typingSpeed = Math.floor(Math.random() * 15) + 10;
            setTimeout(() => typeWriterEffectHTML(element, htmlString, index), typingSpeed);
        }
    }
</script>

</body>
</html>
